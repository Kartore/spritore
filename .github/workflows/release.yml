name: Release

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain

      - name: Verify tag matches package versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(
            cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[] | select(.name == "spritore") | .version'
          )"
          npm_version="$(node -p "require('./js/package.json').version")"

          if [[ -z "${cargo_version}" || "${cargo_version}" == "null" ]]; then
            echo "Could not read the spritore Cargo package version" >&2
            exit 1
          fi

          if [[ "${cargo_version}" != "${npm_version}" ]]; then
            echo "Cargo version ${cargo_version} does not match npm version ${npm_version}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != "v${cargo_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match v${cargo_version}" >&2
            exit 1
          fi

          echo "version=${cargo_version}" >> "${GITHUB_OUTPUT}"

      - name: Rust gates
        run: |
          cargo fmt --check
          cargo clippy --workspace -- -D warnings
          cargo test --workspace

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: wasm-bindgen@0.2.125

      - name: Install binaryen (wasm-opt)
        run: |
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_131/binaryen-version_131-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_131/bin" >> "$GITHUB_PATH"

      - uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0
        with:
          package-json-file: "js/package.json"
          install: false

      - name: Install pnpm dependencies
        working-directory: js
        run: pnpm install

      - name: Build wasm package
        working-directory: js
        run: pnpm build

      - name: Test npm package
        working-directory: js
        run: pnpm test

      - name: Publish to npm
        working-directory: js
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          if pnpm view "@kartore/spritore@${VERSION}" version >/dev/null 2>&1; then
            echo "@kartore/spritore ${VERSION} is already published"
          else
            pnpm publish --access public --no-git-checks
          fi

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show active-toolchain

      - name: Check whether spritore-core is published
        id: core_status
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          if cargo info "spritore-core@${VERSION}" --registry crates-io >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Authenticate spritore-core publish
        if: steps.core_status.outputs.published != 'true'
        id: auth_core
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish spritore-core
        if: steps.core_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth_core.outputs.token }}
        run: cargo publish -p spritore-core --locked

      - name: Wait for spritore-core to become available
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          for attempt in {1..30}; do
            if cargo info "spritore-core@${VERSION}" --registry crates-io >/dev/null 2>&1; then
              exit 0
            fi

            echo "Waiting for spritore-core ${VERSION} (${attempt}/30)"
            sleep 10
          done

          echo "spritore-core ${VERSION} did not become available" >&2
          exit 1

      - name: Check whether spritore is published
        id: spritore_status
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          if cargo info "spritore@${VERSION}" --registry crates-io >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Authenticate spritore publish
        if: steps.spritore_status.outputs.published != 'true'
        id: auth_spritore
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish spritore
        if: steps.spritore_status.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth_spritore.outputs.token }}
        run: cargo publish -p spritore --locked
